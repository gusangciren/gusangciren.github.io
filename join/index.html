    document.addEventListener('DOMContentLoaded', () => {
    let _searchIndex = null;

    async function loadSearchIndex() {
      if (_searchIndex) return _searchIndex;
      try {
        const resp = await fetch('/search.json?t=' + Date.now());
        _searchIndex = await resp.json();
      } catch (e) {
        console.warn('search.json load failed', e);
        _searchIndex = { posts: [], books: [] };
      }
      return _searchIndex;
    }

    function openSearch() {
      const overlay = document.getElementById('search-overlay');
      const input = document.getElementById('search-input');
      overlay.classList.add('active');
      input.value = '';
      input.focus();
      renderResults('');
    }

    function closeSearch() {
      document.getElementById('search-overlay').classList.remove('active');
    }

    function getSnippet(text, keyword, radius) {
      radius = radius || 30;
      if (!text) return '';
      const idx = text.toLowerCase().indexOf(keyword.toLowerCase());
      if (idx === -1) return text.substring(0, 80);
      const start = Math.max(0, idx - radius);
      const end = Math.min(text.length, idx + keyword.length + radius);
      let s = text.substring(start, end);
      if (start > 0) s = '…' + s;
      if (end < text.length) s = s + '…';
      return s;
    }

    function renderResults(query) {
      const container = document.getElementById('search-results');
      if (!query.trim()) {
        container.innerHTML = '<div class="search-empty">输入关键词搜索文章和书籍…</div>';
        return;
      }
      const q = query.toLowerCase();
      const index = _searchIndex || { posts: [], books: [] };
      const matchedPosts = index.posts.filter(p =>
        p.title.toLowerCase().includes(q) ||
        (p.desc || '').toLowerCase().includes(q) ||
        (p.content || '').toLowerCase().includes(q)
      );
      const matchedBooks = index.books.filter(b =>
        b.title.toLowerCase().includes(q) ||
        (b.desc || '').toLowerCase().includes(q) ||
        (b.content || '').toLowerCase().includes(q)
      );
      if (matchedPosts.length === 0 && matchedBooks.length === 0) {
        container.innerHTML = '<div class="search-empty">没有找到相关结果</div>';
        return;
      }
      let html = '';
      matchedPosts.forEach(p => {
        const snippet = getSnippet(p.content || '', q, 35);
        const displayDesc = (p.desc || '') || snippet;
        html += '<a href="/blog/' + p.slug + '?q=' + encodeURIComponent(q) + '" class="search-result-item">' +
          '<div class="search-result-title"><span class="search-result-type">文章</span>' + p.title + '</div>' +
          '<div class="search-result-desc">' + displayDesc + '</div>' +
        '</a>';
      });
      matchedBooks.forEach(b => {
        const snippet = getSnippet(b.content || '', q, 35);
        const displayDesc = (b.desc || '') || snippet;
        html += '<a href="/book/' + b.slug + '?q=' + encodeURIComponent(q) + '" class="search-result-item">' +
          '<div class="search-result-title"><span class="search-result-type">书籍</span>' + b.title + '</div>' +
          '<div class="search-result-desc">' + displayDesc + '</div>' +
        '</a>';
      });
      container.innerHTML = html;
    }

    // ===== 搜索 FAB 拖动逻辑 =====
    (function() {
      const fab = document.getElementById('search-toggle');
      const FAB_SIZE = 56;
      let isDragging = false;
      let startX, startY, startLeft, startTop;
      let dragMoved = false;

      function onDown(clientX, clientY) {
        isDragging = true;
        dragMoved = false;
        startX = clientX;
        startY = clientY;
        const rect = fab.getBoundingClientRect();
        startLeft = rect.left;
        startTop = rect.top;
        fab.classList.add('dragging');
      }

      function onMove(clientX, clientY) {
        if (!isDragging) return;
        const dx = clientX - startX;
        const dy = clientY - startY;
        if (!dragMoved && (Math.abs(dx) > 5 || Math.abs(dy) > 5)) {
          dragMoved = true;
          // 切换到绝对 left/top 定位
          fab.style.bottom = 'auto';
          fab.style.right = 'auto';
          fab.style.left = startLeft + 'px';
          fab.style.top = startTop + 'px';
        }
        if (dragMoved) {
          let newLeft = Math.max(4, Math.min(startLeft + dx, window.innerWidth - FAB_SIZE - 4));
          let newTop  = Math.max(4, Math.min(startTop  + dy, window.innerHeight - FAB_SIZE - 4));
          fab.style.left = newLeft + 'px';
          fab.style.top  = newTop  + 'px';
        }
      }

      function onUp() {
        if (!isDragging) return;
        isDragging = false;
        fab.classList.remove('dragging');
        if (!dragMoved) {
          // 判定为点击，打开搜索
          loadSearchIndex().then(() => openSearch());
        }
      }

      fab.addEventListener('mousedown', e => { if (e.button === 0) { onDown(e.clientX, e.clientY); e.preventDefault(); } });
      document.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
      document.addEventListener('mouseup', onUp);

      fab.addEventListener('touchstart', e => { onDown(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); }, { passive: false });
      document.addEventListener('touchmove', e => { if (isDragging) { onMove(e.touches[0].clientX, e.touches[0].clientY); e.preventDefault(); } }, { passive: false });
      document.addEventListener('touchend', onUp);
    })();

    document.getElementById('search-close').addEventListener('click', closeSearch);
    document.getElementById('search-overlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) closeSearch();
    });
    document.getElementById('search-input').addEventListener('input', (e) => {
      renderResults(e.target.value);
    });
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeSearch();
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        loadSearchIndex().then(() => openSearch());
      }
    });
    });
  </script> <!-- 页面关键词高亮（从搜索结果跳转过来时） --> <script>
    (function() {
      function getQueryParam(name) {
        const url = new URL(window.location.href);
        return url.searchParams.get(name) || '';
      }

      function escapeRegExp(string) {
        return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
      }

      function highlightKeyword(keyword) {
        if (!keyword.trim()) return;
        const main = document.querySelector('main');
        if (!main) return;

        const walker = document.createTreeWalker(main, NodeFilter.SHOW_TEXT, null, false);
        const nodesToReplace = [];
        const regex = new RegExp('(' + escapeRegExp(keyword) + ')', 'gi');

        let node;
        while ((node = walker.nextNode())) {
          if (node.parentElement && node.parentElement.tagName === 'MARK') continue;
          if (regex.test(node.textContent)) {
            nodesToReplace.push(node);
          }
        }

        let firstMark = null;
        nodesToReplace.forEach(textNode => {
          const span = document.createElement('span');
          span.innerHTML = textNode.textContent.replace(regex, '<mark class="search-highlight">$1</mark>');
          const marks = span.querySelectorAll('mark');
          if (marks.length > 0 && !firstMark) {
            firstMark = marks[0];
          }
          const fragment = document.createDocumentFragment();
          while (span.firstChild) {
            fragment.appendChild(span.firstChild);
          }
          textNode.parentNode.replaceChild(fragment, textNode);
        });

        if (firstMark) {
          firstMark.scrollIntoView({ behavior: 'smooth', block: 'center' });
          setTimeout(function() {
            const marks = main.querySelectorAll('mark.search-highlight');
            marks.forEach(function(m) {
              const parent = m.parentNode;
              parent.replaceChild(document.createTextNode(m.textContent), m);
              parent.normalize();
            });
          }, 6000);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', function() {
          highlightKeyword(getQueryParam('q'));
        });
      } else {
        highlightKeyword(getQueryParam('q'));
      }
    })();
  </script> <!-- 代码块复制按钮 --> <script>
    (function() {
      function initCopyButtons() {
        document.querySelectorAll('.prose pre').forEach(function(pre) {

          btn.className = 'copy-btn';

              btn.textContent = '失败';
              setTimeout(function() { btn.textContent = '复制'; }, 2000);
            });
          });
          pre.style.position = 'relative';
          pre.appendChild(btn);
        });
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', initCopyButtons);
      } else {
        initCopyButtons();
      }
    })();
  </script> <!-- 微信电子书弹窗（滚动触发 + 每天一次） --> <script>
    (function() {
      // === 配置 ===
      var STORAGE_DAY   = 'ebook_popup_day';    // 今天已弹过
      var STORAGE_DISMISS = 'ebook_popup_dismiss_until'; // 用户点「暂时不要」的过期时间戳
      var SCROLL_THRESHOLD = 0.40; // 滚动 40% 触发
      var TIME_THRESHOLD   = 60000;  // 或停留 60 秒触发

      // === 已有领取人数（可手动更新）===
      var CLAIM_COUNT = 327;

      // === 工具函数 ===
      function todayStr() {
        var d = new Date();
        return d.getFullYear() + '-' + (d.getMonth()+1) + '-' + d.getDate();
      }
      function getDismissUntil() {
        try { return parseInt(localStorage.getItem(STORAGE_DISMISS), 10); } catch(e) { return 0; }
      }

      // === 判断是否应该弹出 ===
      function shouldShow() {
        // 用户点过「暂时不要」且未过期
        var dismissUntil = getDismissUntil();
        if (dismissUntil && Date.now() < dismissUntil) return false;
        // 今天已弹过
        try {
          if (localStorage.getItem(STORAGE_DAY) === todayStr()) return false;
        } catch(e) {}
        return true;
      }

      // === 记录：今天已弹 ===
      function markShown() {
        try { localStorage.setItem(STORAGE_DAY, todayStr()); } catch(e) {}
      }

      // === 记录：暂时不要（7天后）===
      function markDismissed() {
        var t = Date.now() + 7 * 24 * 60 * 60 * 1000;
        try { localStorage.setItem(STORAGE_DISMISS, String(t)); } catch(e) {}
      }

      // === 显示 / 关闭 ===
      var overlay    = document.getElementById('ebook-popup-overlay');
      var closeBtn   = document.getElementById('ebook-popup-close');
      var dismissBtn = document.getElementById('ebook-popup-dismiss');
      var shown      = false;
      var timeTimer  = null;

      function showPopup() {
        if (shown || !overlay || !shouldShow()) return;
        shown = true;
        markShown();
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
      }

      function dismissPopup() {
        if (!overlay) return;
        overlay.classList.remove('active');
        document.body.style.overflow = '';
        if (timeTimer) clearTimeout(timeTimer);
      }

      if (!overlay) return;

      // === 触发条件 1：滚动超过 40% ===
      var scrollFired = false;
      window.addEventListener('scroll', function() {
        if (scrollFired) return;
        var h = document.body.scrollHeight - window.innerHeight;
        if (h <= 0) return;
        if (window.scrollY / h > SCROLL_THRESHOLD) {
          scrollFired = true;
          showPopup();
        }
      }, { passive: true });

      // === 触发条件 2：停留超过 60 秒 ===
      timeTimer = setTimeout(function() {
        if (!scrollFired) showPopup();
      }, TIME_THRESHOLD);

      // === 关闭按钮 ===
      if (closeBtn) closeBtn.addEventListener('click', dismissPopup);

      // === 「暂时不要」按钮 ===
      if (dismissBtn) {
        dismissBtn.addEventListener('click', function() {
          markDismissed();
          dismissPopup();
        });
      }

      // === 点击遮罩关闭 ===
      overlay.addEventListener('click', function(e) {
        if (e.target === overlay) dismissPopup();
      });

      // === ESC 关闭 ===
      document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' && overlay.classList.contains('active')) {
          dismissPopup();
        }
      });
    })();
  </script> </body></html>
