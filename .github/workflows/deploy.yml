name: Deploy to GitHub Pages

on:
  push:
    branches: [source]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: source
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm install
      - run: npm run build

      - name: Deploy to main branch
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.GUSANC_TOKEN }}
          publish_dir: ./dist
          publish_branch: main
          force_orphan: true
          commit_message: "deploy: ${{ github.event.head_commit.message }}"
