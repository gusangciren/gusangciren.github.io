<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>像企业家一样写作</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="像企业家一样写作" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400&display=swap" rel="stylesheet" />
    <style>
      img { text-align: center; }
      html { scroll-behavior: smooth; }

      /* ── Logo 字体 ── */
      .app-name-link {
        font-family: 'Noto Serif SC', 'Songti SC', 'SimSun', serif !important;
        font-size: 14px !important;
        font-weight: 300 !important;
        letter-spacing: 0.06em !important;
        color: #444 !important;
        opacity: 0.85;
      }
      .app-name-link:hover { opacity: 1 !important; }

      /* ── Docsify 自带搜索框：藏到屏幕外，保留功能 ── */
      .search {
        position: absolute !important;
        left: -9999px !important;
        top: -9999px !important;
        width: 1px !important;
        height: 1px !important;
        overflow: hidden !important;
        pointer-events: none !important;
        opacity: 0 !important;
      }

      /* ── 悬浮搜索按钮 ── */
      #float-search-btn {
        position: fixed;
        bottom: 28px;
        right: 28px;
        z-index: 10000;
        width: 48px;
        height: 48px;
        background: #fff;
        border: 1.5px solid #e0e0e0;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        box-shadow: 0 2px 12px rgba(0,0,0,0.08);
        transition: all 0.2s ease;
      }
      #float-search-btn:hover {
        box-shadow: 0 4px 20px rgba(0,0,0,0.13);
        transform: translateY(-1px);
        border-color: #bbb;
      }
      #float-search-btn svg {
        width: 18px;
        height: 18px;
        color: #666;
      }

      /* ── 搜索弹窗 ── */
      #float-search-modal {
        display: none;
        position: fixed;
        bottom: 86px;
        right: 28px;
        z-index: 10001;
        width: 320px;
        background: #fff;
        border: 1.5px solid #e0e0e0;
        border-radius: 12px;
        box-shadow: 0 8px 40px rgba(0,0,0,0.12);
        overflow: hidden;
      }
      #float-search-modal.open { display: block; }

      #float-search-input {
        width: 100%;
        box-sizing: border-box;
        padding: 14px 16px;
        font-size: 15px;
        border: none;
        border-bottom: 1px solid #f0f0f0;
        outline: none;
        font-family: 'Noto Serif SC', 'Songti SC', serif;
        color: #333;
        background: #fff;
      }
      #float-search-input::placeholder { color: #bbb; font-weight: 300; }

      /* 搜索结果列表（显示在弹窗内） */
      #float-search-results {
        max-height: 320px;
        overflow-y: auto;
        padding: 0;
      }
      #float-search-results .result-item {
        padding: 10px 16px;
        border-bottom: 1px solid #f5f5f5;
        cursor: pointer;
        transition: background 0.15s;
      }
      #float-search-results .result-item:hover { background: #fafafa; }
      #float-search-results .result-item:last-child { border-bottom: none; }
      #float-search-results .result-title {
        font-size: 13px;
        font-weight: 500;
        color: #333;
        margin-bottom: 3px;
      }
      #float-search-results .result-snippet {
        font-size: 12px;
        color: #999;
        line-height: 1.5;
        overflow: hidden;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }
      #float-search-results .result-snippet em {
        font-style: normal;
        color: #f5a623;
        font-weight: 600;
      }
      #float-search-results .no-result {
        padding: 20px 16px;
        text-align: center;
        color: #bbb;
        font-size: 13px;
      }

      #float-search-hint {
        padding: 8px 16px;
        font-size: 11px;
        color: #ccc;
        text-align: center;
        letter-spacing: 0.03em;
        border-top: 1px solid #f5f5f5;
      }

      /* ── 搜索结果导航条（右上角） ── */
      #search-nav-bar {
        display: none;
        position: fixed;
        top: 58px;
        right: 20px;
        z-index: 9999;
        background: #fff;
        border: 1.5px solid #e8e8e8;
        border-radius: 10px;
        padding: 12px 18px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        font-size: 13px;
        max-width: 240px;
        text-align: center;
      }
      #search-nav-bar.visible { display: block; }
      #search-nav-bar .label { color: #aaa; margin-bottom: 4px; font-size: 11px; letter-spacing: 0.05em; }
      #search-nav-bar .count { font-size: 20px; font-weight: 400; color: #333; margin-bottom: 10px; }
      #search-nav-bar .btns { display: flex; gap: 8px; justify-content: center; }
      #search-nav-bar button {
        background: #f5f5f5;
        border: 1px solid #e0e0e0;
        border-radius: 6px;
        padding: 5px 12px;
        font-size: 12px;
        cursor: pointer;
        color: #555;
        transition: all 0.15s;
      }
      #search-nav-bar button:hover { background: #eee; }
      #search-nav-bar button:disabled { background: #f9f9f9; color: #ccc; border-color: #eee; cursor: not-allowed; }

      /* ── 关键词高亮 ── */
      .search-hl {
        background: #fff3b0 !important;
        color: #8b6914 !important;
        border-radius: 2px;
        padding: 1px 4px !important;
      }
      .search-hl.active {
        background: #f5a623 !important;
        color: #fff !important;
      }

      /* ── 滚动条 ── */
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-thumb { background: #ddd; border-radius: 3px; }

      /* ── 移动端 ── */
      @media (max-width: 768px) {
        #float-search-btn { bottom: 20px; right: 16px; }
        #float-search-modal { right: 12px; bottom: 78px; width: calc(100vw - 24px); }
        #search-nav-bar { right: 12px; top: 50px; max-width: 200px; }
      }
    </style>
  </head>
  <body>
    <div id="app">加载中...</div>

    <!-- 悬浮搜索按钮 -->
    <button id="float-search-btn" onclick="toggleSearchModal()" title="搜索 (Ctrl+K)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
    </button>

    <!-- 搜索弹窗 -->
    <div id="float-search-modal">
      <input
        id="float-search-input"
        type="text"
        placeholder="搜索文章…"
        autocomplete="off"
      />
      <div id="float-search-results"></div>
      <div id="float-search-hint">↑↓ 选择 · Enter 跳转 · Esc 关闭</div>
    </div>

    <!-- 搜索结果导航条 -->
    <div id="search-nav-bar">
      <div class="label">关键词出现</div>
      <div class="count" id="hl-count">0 处</div>
      <div class="btns">
        <button id="hl-prev" onclick="searchHlNav(-1)">← 上一处</button>
        <button id="hl-next" onclick="searchHlNav(1)">下一处 →</button>
      </div>
    </div>

    <script>
      window.$docsify = {
        name: "像企业家一样写作",
        repo: "https://github.com/gusangciren/gusangciren.github.io",
        loadSidebar: true,
        loadNavbar: true,
        coverpage: true,
        maxLevel: 5,
        subMaxLevel: 4,
        mergeNavbar: true,
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "搜索",
          noData: "找不到结果",
          depth: 6,
          hideOtherSidebarContent: false,
        },
        plugins: [
          function(hook) {
            hook.doneEach(function() {
              // 文章加载完后检查是否需要高亮
              setTimeout(function() { window._hlCheck && window._hlCheck(); }, 300);
            });
          }
        ]
      };
    </script>
    <script>
      // ══════════════════════════════════════
      // 悬浮搜索弹窗
      // ══════════════════════════════════════
      var _modalOpen = false;
      var _selectedIdx = -1;
      var _results = [];

      function toggleSearchModal() {
        _modalOpen = !_modalOpen;
        var modal = document.getElementById("float-search-modal");
        var btn = document.getElementById("float-search-btn");
        if (_modalOpen) {
          modal.classList.add("open");
          btn.style.transform = "scale(0.92)";
          setTimeout(function() {
            var inp = document.getElementById("float-search-input");
            inp.focus();
            inp.select();
          }, 60);
        } else {
          modal.classList.remove("open");
          btn.style.transform = "";
        }
      }

      // 把输入同步到 Docsify 隐藏搜索框，读取结果
      function syncToDocsify(val) {
        // 找到 Docsify 的搜索 input（即使在屏幕外也在 DOM 里）
        var docsifyInput = document.querySelector(".search input");
        if (!docsifyInput) return;

        // 设置值并触发 input 事件，让 Docsify 执行搜索
        var nativeInputValueSetter = Object.getOwnPropertyDescriptor(
          window.HTMLInputElement.prototype, "value"
        ).set;
        nativeInputValueSetter.call(docsifyInput, val);
        docsifyInput.dispatchEvent(new Event("input", { bubbles: true }));

        // 等 Docsify 渲染结果后读取
        setTimeout(function() { readDocsifyResults(val); }, 200);
      }

      function readDocsifyResults(term) {
        var container = document.getElementById("float-search-results");
        if (!container) return;

        // 读取 Docsify 渲染的搜索结果
        var items = document.querySelectorAll(".results-panel .matching-post");
        _results = [];
        _selectedIdx = -1;

        if (!term || term.trim() === "") {
          container.innerHTML = "";
          return;
        }

        if (items.length === 0) {
          container.innerHTML = '<div class="no-result">没有找到相关内容</div>';
          return;
        }

        var html = "";
        items.forEach(function(item, i) {
          var titleEl = item.querySelector("h2");
          var pEl = item.querySelector("p");
          var linkEl = item.querySelector("a") || item.closest("a");
          var href = "";
          if (linkEl) href = linkEl.getAttribute("href") || "";
          if (!href && item.closest("a")) href = item.closest("a").getAttribute("href") || "";

          // 尝试从父级 a 标签获取 href
          var parentA = item.closest("a");
          if (parentA) href = parentA.getAttribute("href") || href;

          var title = titleEl ? titleEl.textContent : "文章";
          var snippet = pEl ? pEl.innerHTML : "";

          _results.push({ href: href, title: title });
          html += '<div class="result-item" data-idx="' + i + '" data-href="' + href + '" onclick="goToResult(' + i + ')">' +
            '<div class="result-title">' + title + '</div>' +
            '<div class="result-snippet">' + snippet + '</div>' +
            '</div>';
        });

        container.innerHTML = html;
      }

      function goToResult(idx) {
        var r = _results[idx];
        if (!r) return;
        var href = r.href;
        if (href) {
          // 关闭弹窗
          _modalOpen = true;
          toggleSearchModal();
          // 跳转
          if (href.startsWith("#")) {
            location.hash = href;
          } else {
            location.hash = "#" + href;
          }
        }
      }

      // 输入事件
      document.addEventListener("DOMContentLoaded", function() {
        var inp = document.getElementById("float-search-input");
        if (!inp) return;

        inp.addEventListener("input", function() {
          syncToDocsify(this.value);
        });

        inp.addEventListener("keydown", function(e) {
          var items = document.querySelectorAll("#float-search-results .result-item");
          if (e.key === "ArrowDown") {
            e.preventDefault();
            _selectedIdx = Math.min(_selectedIdx + 1, items.length - 1);
            updateSelection(items);
          } else if (e.key === "ArrowUp") {
            e.preventDefault();
            _selectedIdx = Math.max(_selectedIdx - 1, 0);
            updateSelection(items);
          } else if (e.key === "Enter") {
            if (_selectedIdx >= 0 && _results[_selectedIdx]) {
              goToResult(_selectedIdx);
            } else if (_results.length > 0) {
              goToResult(0);
            }
          } else if (e.key === "Escape") {
            _modalOpen = true;
            toggleSearchModal();
          }
        });
      });

      function updateSelection(items) {
        items.forEach(function(el, i) {
          el.style.background = i === _selectedIdx ? "#fafafa" : "";
          el.style.borderLeft = i === _selectedIdx ? "3px solid #f5a623" : "";
        });
      }

      // 全局快捷键
      document.addEventListener("keydown", function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === "k") {
          e.preventDefault();
          toggleSearchModal();
        }
        if (e.key === "Escape" && _modalOpen) {
          _modalOpen = true;
          toggleSearchModal();
        }
      });

      // 点击弹窗外关闭
      document.addEventListener("click", function(e) {
        if (!_modalOpen) return;
        var modal = document.getElementById("float-search-modal");
        var btn = document.getElementById("float-search-btn");
        if (modal && !modal.contains(e.target) && btn && !btn.contains(e.target)) {
          _modalOpen = true;
          toggleSearchModal();
        }
      });

      // ══════════════════════════════════════
      // 文章内关键词高亮 + 导航
      // ══════════════════════════════════════
      (function() {
        var hlNodes = [];
        var hlIndex = -1;

        function getTerm() {
          var q = location.hash.indexOf("?");
          if (q !== -1) {
            var t = new URLSearchParams(location.hash.substring(q)).get("search");
            if (t) return decodeURIComponent(t).trim();
          }
          var params = new URLSearchParams(location.search);
          var t2 = params.get("search");
          return t2 ? decodeURIComponent(t2).trim() : null;
        }

        function build() {
          var term = getTerm();
          hlNodes = [];
          hlIndex = -1;

          var bar = document.getElementById("search-nav-bar");
          if (!term) {
            if (bar) bar.classList.remove("visible");
            return;
          }

          var esc = term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
          var regex = new RegExp("(" + esc + ")", "gi");

          var walker = document.createTreeWalker(
            document.body, NodeFilter.SHOW_TEXT, null, false
          );
          var node;
          while ((node = walker.nextNode())) {
            var val = node.nodeValue;
            if (!val || !val.match(regex)) continue;
            var parent = node.parentElement;
            if (!parent) continue;
            var tag = parent.tagName.toLowerCase();
            if (["script","style","noscript","iframe","input","textarea","code","pre"].indexOf(tag) !== -1) continue;
            if (parent.closest(".search-hl, #float-search-modal, #float-search-btn, #search-nav-bar, .search")) continue;
            var html = parent.innerHTML;
            if (html.indexOf('class="search-hl"') !== -1) continue;
            var newHtml = html.replace(regex, '<mark class="search-hl">$1</mark>');
            if (newHtml !== html) {
              parent.innerHTML = newHtml;
              var marks = parent.querySelectorAll(".search-hl");
              for (var i = 0; i < marks.length; i++) {
                hlNodes.push(marks[i]);
              }
            }
          }

          showBar(hlNodes.length);
          if (hlNodes.length > 0) navigateTo(0);
        }

        function showBar(count) {
          var bar = document.getElementById("search-nav-bar");
          if (!bar) return;
          document.getElementById("hl-count").textContent = count + " 处";
          document.getElementById("hl-prev").disabled = count <= 1;
          document.getElementById("hl-next").disabled = count <= 1;
          bar.classList.toggle("visible", count > 0);
        }

        function navigateTo(idx) {
          if (!hlNodes.length) return;
          var active = document.querySelector(".search-hl.active");
          if (active) active.classList.remove("active");
          idx = Math.max(0, Math.min(idx, hlNodes.length - 1));
          hlIndex = idx;
          var node = hlNodes[idx];
          if (node) {
            node.classList.add("active");
            node.scrollIntoView({ behavior: "smooth", block: "center" });
          }
        }

        window.searchHlNav = function(dir) { navigateTo(hlIndex + dir); };

        window._hlCheck = function() { build(); };

        function checkAndRun() {
          var term = getTerm();
          if (!term) {
            var bar = document.getElementById("search-nav-bar");
            if (bar) bar.classList.remove("visible");
            return;
          }
          var tries = 0;
          var iv = setInterval(function() {
            tries++;
            var body = document.querySelector(".markdown-body");
            if (body && body.innerHTML.length > 100) {
              clearInterval(iv);
              build();
            } else if (tries > 25) clearInterval(iv);
          }, 200);
        }

        window.addEventListener("hashchange", function() { setTimeout(checkAndRun, 400); });
        document.addEventListener("DOMContentLoaded", function() { setTimeout(checkAndRun, 800); });
      })();
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  </body>
</html>
