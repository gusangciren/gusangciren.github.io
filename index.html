<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>种一个梦</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="种一个梦 - 个人作品集" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css" />
    <style>
      img {text-align: center;}
      html {scroll-behavior: smooth;}
      /* 搜索关键词高亮样式 */
      .search-hit {
        background: #ffe066;
        color: #1a1a1a;
        border-radius: 3px;
        padding: 0 4px;
        font-weight: 700;
      }
      /* 搜索后首次滚动提示 */
      .search-hit:first-of-type {
        box-shadow: 0 0 0 3px rgba(255,224,102,0.5);
        transition: box-shadow 0.3s;
      }
      ::-webkit-scrollbar {width: 6px; height: 6px;}
      ::-webkit-scrollbar-thumb {background: #ccc; border-radius: 3px;}
    </style>
  </head>
  <body>
    <div id="app">您稍等...</div>
    <script>
      window.$docsify = {
        name: "种一个梦",
        repo: "https://github.com/gusangciren/gusangciren.github.io",
        loadSidebar: true,
        loadNavbar: true,
        coverpage: true,
        maxLevel: 5,
        subMaxLevel: 4,
        mergeNavbar: true,
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "搜索",
          noData: "找不到结果",
          depth: 6,
          hideOtherSidebarContent: false,
        },
      };
    </script>
    <script>
      (function() {
        var highlighted = false;
        var observer = null;

        function getSearchTerm() {
          // Docsify search 会把关键词放在 URL query 参数中
          // 格式: ?search=关键词 或 #/path?search=关键词
          var params = new URLSearchParams(location.search);
          var term = params.get("search");
          if (!term) {
            // 也检查 hash 中的 query
            var hash = location.hash;
            if (hash) {
              var qIdx = hash.indexOf("?");
              if (qIdx !== -1) {
                var hashParams = new URLSearchParams(hash.substring(qIdx));
                term = hashParams.get("search");
              }
            }
          }
          return term ? decodeURIComponent(term).trim() : null;
        }

        function highlightTerm(term) {
          if (!term || highlighted) return;
          highlighted = true;

          var regex = new RegExp(
            "(" + term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")",
            "gi"
          );
          var body = document.body;
          var hitCount = 0;
          var firstHit = null;

          // 遍历所有文字节点
          var walker = document.createTreeWalker(
            body,
            NodeFilter.SHOW_TEXT,
            null,
            false
          );
          var node;
          while ((node = walker.nextNode())) {
            var val = node.nodeValue;
            if (!val || !val.match(regex)) continue;

            var parent = node.parentElement;
            if (!parent) continue;

            var tag = parent.tagName.toLowerCase();
            // 避开这些标签
            if (["script","style","noscript","iframe","input","textarea","code","pre"].indexOf(tag) !== -1) continue;
            // 避开已经高亮的
            if (parent.closest(".search-hit")) continue;

            // 高亮 this 节点的文字
            var span = document.createElement("span");
            var parentText = parent.innerHTML;
            // 只替换第一个匹配
            var replaced = false;
            var newHtml = parentText.replace(regex, function(m) {
              if (replaced) return m;
              replaced = true;
              return "<mark class=\"search-hit\">" + m + "</mark>";
            });
            if (replaced && parentText !== newHtml) {
              parent.innerHTML = newHtml;
              if (!firstHit) firstHit = parent;
              hitCount++;
            }
          }

          // 滚动到第一个匹配位置
          if (firstHit) {
            setTimeout(function() {
              firstHit.scrollIntoView({ behavior: "smooth", block: "center" });
            }, 100);
          }
        }

        function reset() {
          highlighted = false;
          // 移除旧的高亮
          var marks = document.querySelectorAll(".search-hit");
          for (var i = 0; i < marks.length; i++) {
            var mark = marks[i];
            var text = document.createTextNode(mark.textContent);
            mark.parentNode.replaceChild(text, mark);
          }
        }

        // 方法1: Docsify 的 doneEach 钩子（文章加载完成后触发）
        window.$docsify = window.$docsify || {};
        var originalDoneEach = window.$docsify.doneEach;
        window.$docsify.doneEach = function() {
          if (originalDoneEach) originalDoneEach.apply(this, arguments);
          var term = getSearchTerm();
          if (term) {
            reset();
            highlightTerm(term);
          }
        };

        // 方法2: hash 变化时也检查
        window.addEventListener("hashchange", function() {
          setTimeout(function() {
            var term = getSearchTerm();
            if (term) {
              reset();
              highlightTerm(term);
            } else {
              highlighted = false;
            }
          }, 300);
        });

        // 方法3: MutationObserver 兜底（等文章内容真正渲染进来）
        function setupObserver() {
          if (observer) observer.disconnect();
          observer = new MutationObserver(function(mutations) {
            var term = getSearchTerm();
            if (term) {
              var content = document.querySelector(".markdown-body") ||
                            document.querySelector("#main") ||
                            document.getElementById("app");
              if (content && content.innerHTML.length > 50) {
                reset();
                highlightTerm(term);
                observer.disconnect();
              }
            }
          });
          var app = document.getElementById("app");
          if (app) {
            observer.observe(app, { childList: true, subtree: true });
          }
        }
        document.addEventListener("DOMContentLoaded", setupObserver);
        setTimeout(setupObserver, 1000);
      })();
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  </body>
</html>
