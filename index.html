<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <title>种一个梦</title>
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="description" content="种一个梦 - 个人作品集" />
    <meta name="viewport" content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0" />
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify/lib/themes/vue.css" />
    <style>
      img {text-align: center;}
      html {scroll-behavior: smooth;}

      /* 搜索结果计数条 */
      #search-nav-bar {
        display: none;
        position: fixed;
        top: 60px;
        right: 20px;
        z-index: 9999;
        background: #fff;
        border: 2px solid #ffe066;
        border-radius: 8px;
        padding: 10px 16px;
        box-shadow: 0 4px 16px rgba(0,0,0,0.12);
        font-size: 14px;
        max-width: 280px;
        text-align: center;
      }
      #search-nav-bar.visible {display: block;}

      #search-nav-bar .label {
        color: #666;
        margin-bottom: 8px;
        font-size: 13px;
      }
      #search-nav-bar .count {
        font-size: 24px;
        font-weight: 700;
        color: #f5a623;
        margin-bottom: 6px;
      }
      #search-nav-bar .btns {
        display: flex;
        gap: 8px;
        justify-content: center;
      }
      #search-nav-bar button {
        background: #ffe066;
        border: none;
        border-radius: 5px;
        padding: 5px 14px;
        font-size: 13px;
        cursor: pointer;
        font-weight: 600;
        transition: background 0.2s;
      }
      #search-nav-bar button:hover {background: #f5a623; color: #fff;}
      #search-nav-bar button:disabled {background: #ddd; cursor: not-allowed; color: #999;}

      /* 关键词高亮样式 - 非常醒目 */
      .search-hl {
        background: #ffe066 !important;
        color: #c0392b !important;
        border-radius: 3px;
        padding: 1px 5px !important;
        font-weight: 700 !important;
        box-shadow: 0 0 0 2px rgba(255,224,102,0.4);
      }
      /* 当前活动的高亮 */
      .search-hl.active {
        background: #f5a623 !important;
        color: #fff !important;
        box-shadow: 0 0 0 3px rgba(245,166,35,0.5);
      }

      ::-webkit-scrollbar {width: 6px;}
      ::-webkit-scrollbar-thumb {background: #ccc; border-radius: 3px;}
    </style>
  </head>
  <body>
    <div id="app">您稍等...</div>

    <!-- 搜索结果导航条 -->
    <div id="search-nav-bar">
      <div class="label">关键词出现次数</div>
      <div class="count" id="hl-count">0</div>
      <div class="btns">
        <button id="hl-prev" onclick="searchHlNav(-1)">← 上一处</button>
        <button id="hl-next" onclick="searchHlNav(1)">下一处 →</button>
      </div>
    </div>

    <script>
      window.$docsify = {
        name: "种一个梦",
        repo: "https://github.com/gusangciren/gusangciren.github.io",
        loadSidebar: true,
        loadNavbar: true,
        coverpage: true,
        maxLevel: 5,
        subMaxLevel: 4,
        mergeNavbar: true,
        search: {
          maxAge: 86400000,
          paths: "auto",
          placeholder: "搜索",
          noData: "找不到结果",
          depth: 6,
          hideOtherSidebarContent: false,
        },
      };
    </script>
    <script>
      (function() {
        var hlNodes = [];
        var hlIndex = -1;
        var currentTerm = "";

        // 从 URL 中提取搜索关键词
        function getTerm() {
          var params = new URLSearchParams(location.search);
          var t = params.get("search");
          if (!t) {
            var q = location.hash.indexOf("?");
            if (q !== -1) {
              t = new URLSearchParams(location.hash.substring(q)).get("search");
            }
          }
          return t ? decodeURIComponent(t).trim() : null;
        }

        // 高亮并建立节点列表
        function build() {
          var term = getTerm();
          if (!term) return;
          currentTerm = term;
          hlNodes = [];
          hlIndex = -1;

          var regex = new RegExp(
            "(" + term.replace(/[.*+?^${}()|[\]\\]/g, "\\$&") + ")",
            "gi"
          );

          var walker = document.createTreeWalker(
            document.body,
            NodeFilter.SHOW_TEXT,
            null,
            false
          );
          var node;
          while ((node = walker.nextNode())) {
            var val = node.nodeValue;
            if (!val || !val.match(regex)) continue;
            var parent = node.parentElement;
            if (!parent) continue;
            var tag = parent.tagName.toLowerCase();
            if (["script","style","noscript","iframe","input","textarea","code","pre"].indexOf(tag) !== -1) continue;
            if (parent.closest(".search-hl")) continue;
            var html = parent.innerHTML;
            var replaced = false;
            var newHtml = html.replace(regex, function(m) {
              if (replaced) return m;
              replaced = true;
              return "<mark class=\"search-hl\">" + m + "</mark>";
            });
            if (replaced && newHtml !== html) {
              parent.innerHTML = newHtml;
              var marks = parent.querySelectorAll(".search-hl");
              for (var i = 0; i < marks.length; i++) {
                marks[i].dataset.hlIndex = hlNodes.length;
                hlNodes.push(marks[i]);
              }
            }
          }

          showBar(hlNodes.length);
          if (hlNodes.length > 0) navigateTo(0);
        }

        function showBar(count) {
          var bar = document.getElementById("search-nav-bar");
          if (!bar) return;
          document.getElementById("hl-count").textContent = count + " 处";
          var prevBtn = document.getElementById("hl-prev");
          var nextBtn = document.getElementById("hl-next");
          if (prevBtn) prevBtn.disabled = count <= 1;
          if (nextBtn) nextBtn.disabled = count <= 1;
          if (count > 0) {
            bar.classList.add("visible");
          } else {
            bar.classList.remove("visible");
          }
        }

        function navigateTo(idx) {
          if (hlNodes.length === 0) return;
          // 移除旧的活动高亮
          var active = document.querySelector(".search-hl.active");
          if (active) active.classList.remove("active");
          // 边界
          if (idx < 0) idx = 0;
          if (idx >= hlNodes.length) idx = hlNodes.length - 1;
          hlIndex = idx;
          var node = hlNodes[idx];
          if (!node) return;
          node.classList.add("active");
          node.scrollIntoView({ behavior: "smooth", block: "center" });
        }

        // 供按钮调用
        window.searchHlNav = function(dir) {
          navigateTo(hlIndex + dir);
        };

        // Docsify 路由完成后检查
        function checkAndRun() {
          var term = getTerm();
          if (term) {
            // 等文章内容渲染完成（给 Docsify 足够时间）
            var tryCount = 0;
            var interval = setInterval(function() {
              tryCount++;
              var body = document.querySelector(".markdown-body");
              if (body && body.innerHTML.length > 100) {
                clearInterval(interval);
                build();
              } else if (tryCount > 20) {
                clearInterval(interval);
              }
            }, 200);
          }
        }

        // hash 变化 + 首次加载
        window.addEventListener("hashchange", function() {
          setTimeout(checkAndRun, 400);
        });

        // DOMReady 后启动
        document.addEventListener("DOMContentLoaded", function() {
          setTimeout(checkAndRun, 800);
        });
      })();
    </script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/docsify.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/emoji.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/zoom-image.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify/lib/plugins/search.min.js"></script>
    <script src="//cdn.jsdelivr.net/npm/docsify-copy-code/dist/docsify-copy-code.min.js"></script>
  </body>
</html>
